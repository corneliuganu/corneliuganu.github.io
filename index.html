<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      // GitHub Pages SPA redirect support (keeps clean URLs with react-router).
      // If user lands on /some/route, 404.html redirects to /?p=/some/route.
      // This script restores the intended path before the app boots.
      (function () {
        var params = new URLSearchParams(window.location.search);
        var p = params.get("p");
        if (p) {
          params.delete("p");
          var qs = params.toString();
          var newUrl = window.location.origin + p + (qs ? "?" + qs : "") + window.location.hash;
          window.history.replaceState(null, "", newUrl);
        }
      })();
    </script>
    <!-- TODO: Set the document title to the name of your application -->
